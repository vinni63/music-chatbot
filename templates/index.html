<!DOCTYPE html>
<html>
<head>
    <title>Music Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="chat-container">
    <h2>🎵 Music AI Chatbot</h2>

    <div id="chatbox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type or speak...">
        <button onclick="sendMessage()">Send</button>
        <button id="micBtn" onclick="startVoice()">🎤</button>
    </div>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("userInput").value;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: input})
    })
    .then(res => res.json())
    .then(data => {
        let chatbox = document.getElementById("chatbox");
        chatbox.innerHTML += `<div class="user">${input}</div>`;
        chatbox.innerHTML += `<div class="bot">${data.response.join("<br>")}</div>`;
        chatbox.scrollTop = chatbox.scrollHeight;
    });
}
function startVoice() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    const micBtn = document.getElementById("micBtn");

    recognition.lang = "en-US";

    // 🎤 Start animation
    micBtn.classList.add("listening");

    // 🔥 CHANGE ICON HERE (when listening starts)
    micBtn.innerText = "🎙️";

    recognition.start();

    recognition.onresult = function(event) {
        let voiceText = event.results[0][0].transcript;
        document.getElementById("userInput").value = voiceText;
        sendMessage();
    };

    // 🛑 Stop animation
    recognition.onend = function() {
        micBtn.classList.remove("listening");

        // 🔥 CHANGE BACK HERE (when listening stops)
        micBtn.innerText = "🎤";
    };
}
</script>

</body>
</html>
